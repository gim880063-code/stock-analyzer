name: Daily auto-screen (KST 오후, 다중 시도 + 중복 가드)

# 평일 한국 장 마감(15:30) 이후 거래대금·수급 데이터가 안정적으로 채워진 시점에
# 자동 스크리닝을 돌린다.
#
# GitHub 의 예약(schedule/cron) 실행은 "보장되지 않는" 기능이라, 부하가 몰리면
# 조용히 지연·누락된다 (실제로 이 저장소는 단일 예약 시각으로는 한 번도 자동 실행이
# 안 걸렸다). 그래서 서로 다른 시간대로 여러 번 찔러, 그 중 한 번만 걸려도 그날
# 스크리닝이 돌게 한다. 맨 앞 guard job 이 "오늘 이미 성공했거나 진행 중"이면
# 나머지 시도는 건너뛰므로 (Gemini 무료 한도 보호) 중복 작업은 발생하지 않는다.
on:
  schedule:
    - cron: '8 7 * * 1-5'    # 16:08 KST
    - cron: '35 7 * * 1-5'   # 16:35 KST  (1차 누락 대비)
    - cron: '20 8 * * 1-5'   # 17:20 KST  (다른 시간대로 분산)
    - cron: '30 9 * * 1-5'   # 18:30 KST  (최후 백업)
  workflow_dispatch:
    inputs:
      universe:
        description: '유니버스 (safe / kospi_30 / kospi_50)'
        required: false
        default: 'safe'
      deep:
        description: 'LLM 본문 깊이 분석 여부'
        required: false
        default: 'true'

jobs:
  # 오늘(KST) 이미 성공했거나 진행 중인 실행이 있으면 이번 시도는 거른다.
  # 단, 수동 실행(workflow_dispatch)은 사용자가 일부러 다시 돌리는 것이므로 항상 진행.
  guard:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: 오늘 이미 돌았는지 확인 (KST 기준)
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "수동 실행 → 무조건 진행"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TODAY=$(TZ=Asia/Seoul date +%F)
          SELF="${{ github.run_id }}"
          # 기본값은 '진행'(fail-open) — 조회가 실패해도 스크리닝을 거르지 않는다.
          SHOULD_RUN=true
          if runs=$(gh run list --workflow daily-screen.yml -R "${{ github.repository }}" \
                      --json databaseId,status,conclusion,createdAt -L 40 2>/dev/null); then
            # 자기 자신을 제외하고, 오늘(KST) 생성된 실행 중
            #   - 아직 안 끝났거나(진행 중) 또는 성공으로 끝난 것
            # 이 하나라도 있으면 이번 시도는 건너뛴다.
            blocking=$(echo "$runs" | jq -r --arg today "$TODAY" --arg self "$SELF" '
              [ .[]
                | select((.databaseId|tostring) != $self)
                | select(((( .createdAt | fromdateiso8601 ) + 32400) | strftime("%Y-%m-%d")) == $today)
                | select(.status != "completed" or .conclusion == "success")
              ] | length')
            if [ "${blocking:-0}" -gt 0 ]; then
              echo "오늘($TODAY) 이미 성공했거나 진행 중인 실행 ${blocking}건 → 건너뜀"
              SHOULD_RUN=false
            else
              echo "오늘($TODAY) 유효한 실행 없음 → 진행"
            fi
          else
            echo "실행 기록 조회 실패 → 안전하게 진행"
          fi
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

  screen:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run auto-screen
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # GitHub Actions secret 이름은 GITHUB_ 접두사 사용 불가 → GIST_PAT 으로 저장 후
          # 컨테이너 안에서 GITHUB_PAT 환경변수로 노출 (cloud_store.py 가 읽는 이름).
          GITHUB_PAT: ${{ secrets.GIST_PAT }}
          GIST_ID: ${{ secrets.GIST_ID }}
          PYTHONUNBUFFERED: '1'
        run: |
          UNIVERSE="${{ github.event.inputs.universe || 'safe' }}"
          DEEP_FLAG=""
          if [ "${{ github.event.inputs.deep || 'true' }}" = "false" ]; then
            DEEP_FLAG="--no-deep"
          fi
          # 기준 종합점수는 코드 고정(analyzer.SCREEN_MIN_SCORE) — 워크플로 입력 없음.
          python auto_screen.py --universe "$UNIVERSE" $DEEP_FLAG
